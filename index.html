<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Kaswari News · kaswari.net</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue:   #417DC1;
      --red:    #990000;
      --yellow: #FFC72C;
      --brown:  #713907;
      --ink:    #1C1008;
      --muted:  #8A7F74;
      --rule:   #E2DAD0;
      --bg:     #FDFAF5;
      --fh: 'La Orleans', 'Cormorant Garamond', 'Palatino Linotype', Georgia, serif;
      --fs: 'Bellerose', 'EB Garamond', 'Palatino', Georgia, serif;
      --fb: 'EB Garamond', 'Garamond', Georgia, serif;
      --fm: 'DM Mono', 'Courier New', monospace;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--fb);
      font-size: 17px;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }
    a { text-decoration: none; }

    .masthead {
      background: var(--bg);
      border-bottom: 1px solid var(--rule);
      padding: 3.5rem 5rem 2.5rem;
    }
    .masthead-top {
      border-bottom: 3px solid var(--ink);
      padding-bottom: 1rem;
      margin-bottom: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }
    .colour-bar { height: 4px; background: linear-gradient(90deg, var(--blue) 0%, var(--blue) 20%, var(--red) 20%, var(--red) 40%, var(--yellow) 40%, var(--yellow) 60%, var(--brown) 60%, var(--brown) 80%, var(--black) 80%, var(--black) 100%); }
    .pub-name {
      font-family: var(--fh);
      font-size: clamp(4rem, 11vw, 10rem);
      font-weight: 600;
      line-height: 0.9;
      letter-spacing: 0.01em;
    }
    .pub-name .kaswari { color: var(--red); }
    .pub-name .news    { color: var(--blue); font-style: italic; font-weight: 300; }
    .pub-name .dot     { color: var(--yellow); }
    .masthead-tagline {
      font-family: var(--fs);
      font-size: 1rem;
      font-style: italic;
      font-weight: 300;
      color: var(--muted);
      max-width: 360px;
      text-align: right;
      line-height: 1.5;
      padding-bottom: 0.3rem;
    }
    .pub-sub {
      font-family: var(--fm);
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 0.6rem;
    }

    .section-label {
      font-family: var(--fm);
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.2rem;
    }

    .latest-section {
      padding: 3.5rem 5rem 3rem;
      border-bottom: 1px solid var(--rule);
    }
    .latest-card {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 2rem;
      padding: 2.5rem;
      background: #fff;
      border: 1px solid var(--rule);
      text-decoration: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .latest-card:hover {
      border-color: var(--red);
      box-shadow: 0 2px 16px rgba(0,0,0,0.05);
    }
    .latest-date {
      font-family: var(--fh);
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 600;
      font-style: italic;
      color: var(--ink);
      line-height: 1;
    }
    .latest-weekday {
      font-family: var(--fm);
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 0.5rem;
    }
    .latest-cta {
      font-family: var(--fs);
      font-size: 1rem;
      font-weight: 600;
      color: var(--red);
      border: 1px solid var(--red);
      padding: 0.7rem 1.8rem;
      white-space: nowrap;
      transition: background 0.15s, color 0.15s;
    }
    .latest-card:hover .latest-cta { background: var(--red); color: #fff; }

    .archive-section { padding: 3.5rem 5rem 5rem; }
    .archive-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1px;
      background: var(--rule);
      border: 1px solid var(--rule);
      margin-top: 1.5rem;
    }
    .archive-card {
      background: #fff;
      padding: 1.8rem;
      text-decoration: none;
      display: block;
      transition: background 0.15s;
      position: relative;
    }
    .archive-card:hover { background: #FFFEF9; }
    .archive-card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--blue);
      opacity: 0;
      transition: opacity 0.15s;
    }
    .archive-card:hover::after { opacity: 1; }
    .archive-date {
      font-family: var(--fh);
      font-size: 1.4rem;
      font-weight: 600;
      font-style: italic;
      color: var(--ink);
      line-height: 1.2;
    }
    .archive-weekday {
      font-family: var(--fm);
      font-size: 0.57rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 0.4rem;
    }
    .archive-arrow {
      font-family: var(--fs);
      font-size: 0.85rem;
      font-style: italic;
      color: var(--blue);
      margin-top: 1rem;
    }

    .empty-state {
      font-family: var(--fm);
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      padding: 2.5rem 0;
    }

    .mag-footer {
      background: var(--bg);
      border-top: 3px solid var(--ink);
      padding: 2.5rem 5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      margin-top: 2rem;
    }
    .footer-brand { font-family: var(--fh); font-size: 1.8rem; font-weight: 600; }
    .footer-brand .kaswari { color: var(--red); }
    .footer-brand .news    { color: var(--blue); font-style: italic; font-weight: 300; }
    .footer-brand .dot     { color: var(--yellow); }
    .footer-meta {
      font-family: var(--fm);
      font-size: 0.55rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-align: right;
      line-height: 2;
    }

    @media (max-width: 860px) {
      .masthead, .latest-section, .archive-section, .mag-footer { padding-left: 1.5rem; padding-right: 1.5rem; }
      .masthead-top { flex-direction: column; align-items: flex-start; gap: 1rem; }
      .masthead-tagline { text-align: left; }
      .latest-card { flex-direction: column; align-items: flex-start; }
      .archive-grid { grid-template-columns: 1fr 1fr; }
      .mag-footer { flex-direction: column; }
      .footer-meta { text-align: left; }
    }
  </style>
</head>
<body>

<div class="colour-bar"></div>

<header class="masthead">
  <div class="masthead-top">
    <div class="pub-name"><span class="kaswari">Kaswari</span> <span class="news">News</span><span class="dot">.</span></div>
    <div class="masthead-tagline">A daily magazine curated from Hacker News, Reddit &amp; Substack. Three sections — Move, Eat, Sleep.</div>
  </div>
  <div class="pub-sub">Daily · HN · Reddit · Substack · kaswari.net</div>
</header>

<div class="latest-section">
  <div class="section-label">Latest Issue</div>
  <div id="latest-container"></div>
</div>

<div class="archive-section">
  <div class="section-label">Past Issues</div>
  <div id="archive-grid" class="archive-grid"></div>
</div>

<footer class="mag-footer">
  <div class="footer-brand"><span class="kaswari">Kaswari</span> <span class="news">News</span><span class="dot">.</span></div>
  <div class="footer-meta">
    Generated by Claude · kaswari.net<br>
    HN + Reddit + Substack · Daily at 7am
  </div>
</footer>

<script>
  async function findIssues() {
    const today = new Date();
    const checks = [];
    for (let i = 0; i < 90; i++) {
      const d = new Date(today);
      d.setDate(d.getDate() - i);
      checks.push(d.toISOString().slice(0, 10));
    }
    const results = await Promise.all(
      checks.map(async dateStr => {
        try {
          const res = await fetch(`magazines/${dateStr}.html`, { method: 'HEAD' });
          return res.ok ? dateStr : null;
        } catch { return null; }
      })
    );
    return results.filter(Boolean);
  }

  function formatDate(dateStr) {
    const d = new Date(dateStr + "T12:00:00Z");
    return {
      display: d.toLocaleDateString("en-AU", { day: "numeric", month: "long", year: "numeric" }),
      weekday: d.toLocaleDateString("en-AU", { weekday: "long" }),
    };
  }

  async function render() {
    const issues = await findIssues();
    const latestContainer = document.getElementById("latest-container");
    const archiveGrid = document.getElementById("archive-grid");

    if (!issues.length) {
      latestContainer.innerHTML = `<div class="empty-state">No issues yet — run node generate.js to create your first issue.</div>`;
      return;
    }

    const latest = issues[0];
    const ld = formatDate(latest);
    latestContainer.innerHTML = `
      <a class="latest-card" href="magazines/${latest}.html">
        <div>
          <div class="latest-date">${ld.display}</div>
          <div class="latest-weekday">${ld.weekday} · Today's Edition</div>
        </div>
        <div class="latest-cta">Read Today →</div>
      </a>`;

    const archive = issues.slice(1);
    if (!archive.length) {
      archiveGrid.innerHTML = `<div class="empty-state" style="padding:2rem">More issues will appear here as they are published.</div>`;
      return;
    }

    archiveGrid.innerHTML = archive.map(dateStr => {
      const d = formatDate(dateStr);
      return `
        <a class="archive-card" href="magazines/${dateStr}.html">
          <div class="archive-date">${d.display}</div>
          <div class="archive-weekday">${d.weekday}</div>
          <div class="archive-arrow">Read issue →</div>
        </a>`;
    }).join("");
  }

  render();
</script>
</body>
</html>
